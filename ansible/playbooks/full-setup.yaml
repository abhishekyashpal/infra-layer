- name: Full server setup
  hosts: all
  become: true

  roles:
    - role: common
    - role: security
    - role: docker
    - role: k3s
    - role: ingress
      when: enable_ingress | default(true)
    - role: argocd
      when: enable_argocd | default(true)
    - role: monitoring
      when: enable_monitoring | default(true)
