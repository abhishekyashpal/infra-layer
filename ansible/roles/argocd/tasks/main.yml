- name: Add ArgoCD Helm repo
  command: helm repo add argo https://argoproj.github.io/argo-helm
  register: repo_add
  failed_when: repo_add.rc != 0 and 'already exists' not in repo_add.stderr
  changed_when: "'already exists' not in repo_add.stderr"

- name: Update Helm repos
  command: helm repo update
  changed_when: false

- name: Remove previous raw-manifest ArgoCD install
  shell: |
    kubectl delete namespace argocd --ignore-not-found=true --wait=false
    kubectl delete crd \
      applications.argoproj.io \
      applicationsets.argoproj.io \
      appprojects.argoproj.io \
      --ignore-not-found=true --wait=false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  when: cleanup_previous_argocd_install | default(false)

- name: Create argocd namespace
  command: kubectl create namespace argocd
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: argocd_namespace
  failed_when: argocd_namespace.rc != 0 and 'AlreadyExists' not in argocd_namespace.stderr
  changed_when: argocd_namespace.rc == 0

- name: Render ArgoCD Helm values
  template:
    src: argocd-values.yaml.j2
    dest: /tmp/argocd-values.yaml
    mode: "0644"

- name: Install ArgoCD
  command: >
    helm upgrade --install argocd argo/argo-cd
    -n argocd
    --create-namespace
    -f /tmp/argocd-values.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Wait for ArgoCD server to be ready
  command: kubectl rollout status deployment/argocd-server -n argocd --timeout=600s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Wait for ArgoCD Application CRD to be ready
  command: kubectl wait --for=condition=Established crd/applications.argoproj.io --timeout=300s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Generate bcrypt hash for ArgoCD admin password
  shell: |
    python3 -c "import bcrypt, os; pw = os.environ['ARGOCD_ADMIN_PASSWORD'].encode(); print(bcrypt.hashpw(pw, bcrypt.gensalt()).decode())"
  environment:
    ARGOCD_ADMIN_PASSWORD: "{{ argocd_admin_password }}"
  register: argocd_admin_password_hash
  changed_when: false
  no_log: true
  when: argocd_admin_password is defined

- name: Render GitOps repository credentials
  template:
    src: gitops-repository-secret.yaml.j2
    dest: /tmp/argocd-gitops-repository-secret.yaml
    mode: "0600"
  no_log: true
  when:
    - gitops_repo_url is defined
    - gitops_repo_url | length > 0
    - (gitops_repo_username is defined and gitops_repo_username | length > 0)
      or (gitops_repo_password is defined and gitops_repo_password | length > 0)
      or (gitops_repo_ssh_private_key is defined and gitops_repo_ssh_private_key | length > 0)

- name: Register private GitOps repository with ArgoCD
  command: kubectl apply -f /tmp/argocd-gitops-repository-secret.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  no_log: true
  when:
    - gitops_repo_url is defined
    - gitops_repo_url | length > 0
    - (gitops_repo_username is defined and gitops_repo_username | length > 0)
      or (gitops_repo_password is defined and gitops_repo_password | length > 0)
      or (gitops_repo_ssh_private_key is defined and gitops_repo_ssh_private_key | length > 0)

- name: Render GitOps root application
  template:
    src: gitops-application.yaml.j2
    dest: /tmp/argocd-gitops-application.yaml
    mode: "0644"
  when:
    - gitops_repo_url is defined
    - gitops_repo_url | length > 0

- name: Create GitOps root application
  command: kubectl apply -f /tmp/argocd-gitops-application.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when:
    - gitops_repo_url is defined
    - gitops_repo_url | length > 0

- name: Render ArgoCD ingress
  template:
    src: argocd-ingress.yaml.j2
    dest: /tmp/argocd-ingress.yaml
    mode: "0644"
  when:
    - argocd_domain is defined
    - argocd_domain | length > 0

- name: Create ArgoCD ingress
  command: kubectl apply -f /tmp/argocd-ingress.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when:
    - argocd_domain is defined
    - argocd_domain | length > 0

- name: Patch ArgoCD admin secret with configured password
  shell: |
    kubectl -n argocd patch secret argocd-secret --type=json -p \
      '[{"op":"replace","path":"/data/admin.password","value":"{{ argocd_admin_password_hash.stdout | b64encode }}"}]'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  no_log: true
  when: argocd_admin_password is defined


