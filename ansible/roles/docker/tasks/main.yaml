- name: Install Docker dependencies
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Add Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | apt-key add -

- name: Install Docker
  apt:
    name:
      - docker.io
    state: present

- name: Start Docker service
  service:
    name: docker
    state: started
    enabled: true